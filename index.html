<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>OIO ONE · Família</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-color: #0b141a;
            --header-color: #202c33;
            --my-bubble: #005c4b;
            --their-bubble: #202c33;
            --accent: #00e5ff;
            --text-main: #e9edef;
            --text-muted: #8696a0;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main); overflow: hidden;
        }

        /* --- ESTRUTURA --- */
        #app { display: flex; flex-direction: column; height: 100vh; }

        header {
            background: var(--header-color);
            padding: 10px 16px; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-top: env(safe-area-inset-top);
        }

        .user-bar { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1px solid var(--accent); }
        .user-status { font-size: 0.8rem; color: var(--accent); }

        /* --- CHAT REAL --- */
        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px 10px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay; background-color: #0b141a;
            display: flex; flex-direction: column; gap: 4px;
        }

        .bubble-wrap { display: flex; width: 100%; margin-bottom: 2px; }
        .bubble-wrap.me { justify-content: flex-end; }
        .bubble-wrap.them { justify-content: flex-start; }

        .bubble {
            max-width: 75%; padding: 8px 12px; border-radius: 8px;
            position: relative; font-size: 0.95rem; line-height: 1.4;
            box-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }

        .bubble.me { background: var(--my-bubble); border-top-right-radius: 0; }
        .bubble.them { background: var(--their-bubble); border-top-left-radius: 0; }

        .bubble-name { font-size: 0.75rem; font-weight: bold; color: var(--accent); margin-bottom: 2px; }
        .time { font-size: 0.65rem; color: var(--text-muted); text-align: right; margin-top: 4px; display: block; }

        /* --- BARRA DE INPUT --- */
        .input-bar {
            background: var(--header-color); padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
            display: flex; align-items: center; gap: 8px;
        }

        .input-container {
            flex: 1; background: #2a3942; border-radius: 20px;
            padding: 8px 16px; display: flex; align-items: center;
        }

        input {
            flex: 1; background: transparent; border: none; color: white;
            outline: none; font-size: 1rem;
        }

        .btn-round {
            width: 45px; height: 45px; border-radius: 50%; background: var(--accent);
            color: #000; display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; font-size: 1.2rem;
        }

        /* Login Animado */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg-color); 
            z-index: 9999; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
        }
        .login-card { background: var(--header-color); padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--accent); }
        .login-input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 10px; border: 1px solid #333; background: #111; color: white; outline: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="font-family: 'Rajdhani', sans-serif;">OIO ONE</h2>
        <p style="color: var(--text-muted)">Identidade da Família</p>
        <input type="text" id="user-input" class="login-input" placeholder="Seu Nome">
        <button class="btn-round" style="width: 100%; border-radius: 10px;" onclick="startApp()">ENTRAR</button>
    </div>
</div>

<div id="app" style="display:none;">
    <header>
        <div class="user-bar">
            <img src="https://github.com/MichelDetilli.png" class="avatar">
            <div>
                <div style="font-weight: bold;">Família OIO</div>
                <div class="user-status">visto por último hoje às 13:20</div>
            </div>
        </div>
        <div style="display:flex; gap:15px; color: var(--text-muted)">
            <i class="fa-solid fa-video"></i>
            <i class="fa-solid fa-phone"></i>
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
    </header>

    <main id="chat-window"></main>

    <div class="input-bar">
        <div class="input-container">
            <i class="fa-regular fa-face-smile" style="color: var(--text-muted); margin-right: 10px;"></i>
            <input type="text" id="msg-input" placeholder="Mensagem">
            <i class="fa-solid fa-paperclip" style="color: var(--text-muted); transform: rotate(45deg)"></i>
        </div>
        <button class="btn-round" onclick="sendMessage()">
            <i class="fa-solid fa-paper-plane" id="send-icon"></i>
        </button>
    </div>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
        databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
        projectId: "vibe-app-bbba2",
        storageBucket: "vibe-app-bbba2.appspot.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let meuNome = "";

    function startApp() {
        meuNome = document.getElementById('user-input').value.trim();
        if(!meuNome) return alert("Digite seu nome!");
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        loadMessages();
    }

    function sendMessage() {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        
        db.ref('chat_familia').push({
            nome: meuNome,
            texto: input.value,
            hora: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            ts: Date.now()
        });
        input.value = "";
    }

    function loadMessages() {
        db.ref('chat_familia').limitToLast(50).on('value', snap => {
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            snap.forEach(c => {
                const m = c.val();
                const isMe = m.nome === meuNome;
                const wrap = document.createElement('div');
                wrap.className = `bubble-wrap ${isMe ? 'me' : 'them'}`;
                wrap.innerHTML = `
                    <div class="bubble ${isMe ? 'me' : 'them'}">
                        ${!isMe ? `<div class="bubble-name">${m.nome}</div>` : ''}
                        <div>${m.texto}</div>
                        <span class="time">${m.hora}</span>
                    </div>
                `;
                win.appendChild(wrap);
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    // Enter para enviar
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); }
</script>
</body>
</html>
