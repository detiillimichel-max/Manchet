<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OIO ONE · Família</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #0b141a; --header: #202c33; --accent: #00e5ff;
            --me: #005c4b; --them: #202c33; --text: #e9edef;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); font-family: sans-serif; color: var(--text);
            overflow: hidden; position: fixed;
        }

        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        header {
            background: var(--header); padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between;
            padding-top: env(safe-area-inset-top); z-index: 10;
        }

        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--accent); }

        /* ÁREA DE MENSAGENS REFORÇADA */
        #chat-window {
            flex: 1; overflow-y: auto; padding: 15px;
            background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-color: rgba(11, 20, 26, 0.9); background-blend-mode: multiply;
            display: flex; flex-direction: column; gap: 6px;
        }

        .bubble {
            max-width: 80%; padding: 8px 12px; border-radius: 10px;
            font-size: 0.95rem; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .me { align-self: flex-end; background: var(--me); border-top-right-radius: 0; }
        .them { align-self: flex-start; background: var(--them); border-top-left-radius: 0; }

        .bubble-name { font-size: 0.7rem; font-weight: bold; color: var(--accent); margin-bottom: 3px; }
        .time { font-size: 0.6rem; opacity: 0.6; text-align: right; display: block; margin-top: 4px; }

        /* BARRA DE BAIXO FIXA */
        .footer-bar {
            background: var(--header); padding: 10px;
            display: flex; align-items: center; gap: 10px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }

        .input-box {
            flex: 1; background: #2a3942; border-radius: 25px;
            padding: 10px 15px; display: flex; align-items: center;
        }

        input {
            flex: 1; background: transparent; border: none; color: white;
            outline: none; font-size: 1rem;
        }

        .btn-send {
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--accent); border: none; color: #000;
            display: flex; align-items: center; justify-content: center;
        }

        /* LOGIN */
        #login-screen {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card { 
            background: var(--header); padding: 30px; border-radius: 20px; 
            width: 100%; max-width: 350px; text-align: center; border: 1px solid var(--accent);
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="color:var(--accent); letter-spacing: 2px;">OIO ONE</h2>
        <p style="opacity: 0.6; margin-bottom: 20px;">Identidade da Família</p>
        <input type="text" id="user-input" style="width:100%; padding:12px; border-radius:8px; border:none; background:#111; color:white;" placeholder="Seu Nome">
        <button onclick="entrarApp()" style="width:100%; margin-top:15px; padding:12px; border-radius:8px; background:var(--accent); border:none; font-weight:bold;">ENTRAR</button>
    </div>
</div>

<div id="app">
    <header>
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="https://github.com/MichelDetilli.png" class="avatar">
            <div>
                <div style="font-weight:bold;">Família OIO</div>
                <div style="font-size:0.7rem; color:var(--accent);">online</div>
            </div>
        </div>
        <i class="fa-solid fa-ellipsis-vertical" style="opacity:0.6;"></i>
    </header>

    <main id="chat-window"></main>

    <div class="footer-bar">
        <div class="input-box">
            <i class="fa-regular fa-face-smile" style="opacity:0.5; margin-right:10px;"></i>
            <input type="text" id="msg-input" placeholder="Mensagem">
            <i class="fa-solid fa-paperclip" style="opacity:0.5; transform: rotate(45deg);"></i>
        </div>
        <button class="btn-send" onclick="enviarMsg()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>
</div>

<script>
    // Suas credenciais Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAWL1XRR8JK-J5Qk5DSIKmBl4ZYMZw1R4I",
        databaseURL: "https://vibe-app-bbba2-default-rtdb.firebaseio.com/",
        projectId: "vibe-app-bbba2",
        storageBucket: "vibe-app-bbba2.appspot.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let user = "";

    function entrarApp() {
        user = document.getElementById('user-input').value.trim();
        if(user) {
            document.getElementById('login-screen').style.display = 'none';
            conectarChat();
        }
    }

    function enviarMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        db.ref('chat_v1').push({
            nome: user,
            msg: inp.value,
            hora: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
        });
        inp.value = "";
    }

    function conectarChat() {
        db.ref('chat_v1').limitToLast(30).on('value', s => {
            const win = document.getElementById('chat-window');
            win.innerHTML = "";
            s.forEach(item => {
                const d = item.val();
                const isMe = d.nome === user;
                const div = document.createElement('div');
                div.className = `bubble ${isMe ? 'me' : 'them'}`;
                div.innerHTML = `
                    ${!isMe ? `<div class="bubble-name">${d.nome}</div>` : ''}
                    ${d.msg}
                    <span class="time">${d.hora}</span>
                `;
                win.appendChild(div);
            });
            win.scrollTop = win.scrollHeight;
        });
    }

    // Atalho Enter
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') enviarMsg(); }
</script>
</body>
</html>
