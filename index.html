<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b141a">
    <title>Zap Lite Luxury</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon-192x192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-dark-bg text-gray-100 font-sans h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="flex-1 flex flex-col items-center justify-center p-6 z-50">
        <div class="glass-panel p-8 rounded-2xl w-full max-w-sm flex flex-col gap-4">
            <h1 class="text-2xl font-bold text-emerald-400 text-center mb-4">Vibe App - Acesso</h1>
            <input type="text" id="login-nome" placeholder="Identidade (Nome)" class="p-3 rounded-lg bg-black/30 border border-white/10 text-white focus:outline-none focus:border-emerald-500">
            <input type="password" id="login-senha" placeholder="Código (Senha)" class="p-3 rounded-lg bg-black/30 border border-white/10 text-white focus:outline-none focus:border-emerald-500">
            <button id="btn-login" class="bg-emerald-600 hover:bg-emerald-500 p-3 rounded-lg font-semibold mt-2 transition-colors">Entrar</button>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-col h-full">
        <header class="glass-header p-4 flex justify-between items-center z-20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gray-700 bg-cover" style="background-image: url('assets/avatar-placeholder.png')"></div>
                <div>
                    <h2 class="text-sm font-semibold" id="chat-contact-name">OIO ONE Hub</h2>
                    <span class="text-xs text-emerald-400" id="chat-presence">online</span>
                </div>
            </div>
        </header>

        <main id="chat-container" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3 no-scrollbar relative z-10">
        </main>

        <footer class="glass-footer p-3 flex items-center gap-2 z-20">
            <button id="btn-attach" class="p-2 text-gray-400 hover:text-white">📎</button>
            <input type="file" id="file-input" class="hidden" accept="image/*,application/pdf">
            
            <input type="text" id="msg-input" placeholder="Digite uma mensagem..." class="flex-1 bg-black/40 border border-white/10 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-emerald-500 text-white">
            
            <button id="btn-send" class="bg-emerald-500 p-3 rounded-full text-white hidden">➤</button>
            <button id="btn-mic" class="bg-emerald-600 p-3 rounded-full text-white">🎤</button>
        </footer>
    </div>

    <script src="js/services/firebase-client.js"></script>
    <script src="js/services/chat-service.js"></script>
    <script src="js/components/chat-ui.js"></script>
    <script src="app.js"></script>
</body>
</html>
